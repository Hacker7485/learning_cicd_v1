version: 0.2

env:
  variables:
    LAMBDA_FUNCTION_NAME: "github-cicd-lambda"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies..."
      - python --version
      - pip install --upgrade pip

  pre_build:
    commands:
      - echo "Preparing Lambda deployment package..."
      - rm -rf package
      - rm -f lambda-deployment.zip
      - mkdir -p package

  build:
    commands:
      - echo "Installing dependencies into package directory..."
      - |
        if [ -s requirements.txt ]; then
          pip install -r requirements.txt -t package/
        else
          echo "No external dependencies found."
        fi

      - echo "Copying Lambda source code..."
      - cp lambda_function.py package/

      - echo "Creating Lambda ZIP file..."
      - cd package
      - zip -r ../lambda-deployment.zip .
      - cd ..

  post_build:
    commands:
      - echo "Updating Lambda function..."
      - aws lambda update-function-code --function-name "$LAMBDA_FUNCTION_NAME" --zip-file fileb://lambda-deployment.zip
      - echo "Waiting for Lambda update to complete..."
      - aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"
      - echo "Lambda deployment completed successfully."

artifacts:
  files:
    - lambda-deployment.zip